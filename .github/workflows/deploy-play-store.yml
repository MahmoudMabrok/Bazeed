name: Deploy to Play Store

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: true
        type: string
      track:
        description: 'Play Store track'
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      version_code:
        description: 'Version code (defaults to GitHub run number)'
        required: false
        type: string
      status:
        description: 'Release status'
        required: true
        default: completed
        type: choice
        options:
          - completed
          - draft
          - inProgress
          - halted

permissions:
  contents: read

jobs:
  deploy:
    name: Build signed AAB and upload
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed customer release AAB
        env:
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code || github.run_number }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:bundleCustomerRelease --no-daemon --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-customer-release-aab
          path: app/build/outputs/bundle/customerRelease/*.aab
          if-no-files-found: error

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: tools.mo3ta.bazeed
          releaseFiles: app/build/outputs/bundle/customerRelease/app-customer-release.aab
          track: ${{ inputs.track }}
          status: ${{ inputs.status }}
          whatsNewDirectory: docs/play-store/whatsnew
